<div style="background-color:#0f172a;padding:40px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" style="max-width:480px;margin:0 auto;border-collapse:collapse;">
    <tr>
      <td style="text-align:center;padding-bottom:28px;">
        <img src="https://vantagevb.net/logo.png" alt="VANTAGE" width="180" style="display:inline-block;height:auto;border:0;">
      </td>
    </tr>
    <tr>
      <td style="background-color:#1e293b;border-radius:16px;padding:36px 28px;text-align:center;">
        <h2 style="margin:0 0 12px;color:#ffffff;font-size:20px;font-weight:800;">Confirm your email</h2>
        <p style="margin:0 0 28px;color:#94a3b8;font-size:14px;line-height:1.6;">

        </p>
        <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#e8530b;color:#ffffff;font-weight:700;font-size:14px;text-decoration:none;padding:14px 36px;border-radius:12px;">Confirm Email</a>

          <a href="{{ .ConfirmationURL }}" style="color:#e8530b;word-break:break-all;">{{ .ConfirmationURL }}</a>

    </tr>
    <tr>
      <td style="text-align:center;padding-top:24px;">
        <p style="margin:0;color:#475569;font-size:11px;letter-spacing:0.08em;">VANTAGE &middot; VOLLEYBALL ANALYTICS</p>
      </td>
    </tr>
